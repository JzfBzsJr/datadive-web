<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataDive Explorer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
    }

    .container { width: 100%; max-width: 920px; }

    header { text-align: center; margin-bottom: 32px; }
    header h1 {
      font-size: 1.9rem; font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #06b6d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    header p { margin-top: 8px; color: #94a3b8; font-size: 0.93rem; }

    .card {
      background: #1e2130; border: 1px solid #2d3348;
      border-radius: 12px; padding: 24px; margin-bottom: 18px;
    }

    label {
      display: block; font-size: 0.78rem; font-weight: 600;
      color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 7px;
    }

    input[type="password"], textarea {
      width: 100%; background: #0f1117; border: 1px solid #2d3348;
      border-radius: 8px; color: #e2e8f0; font-size: 0.93rem;
      padding: 11px 13px; outline: none; transition: border-color 0.2s; font-family: inherit;
    }
    input[type="password"]:focus, textarea:focus { border-color: #6366f1; }
    textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

    .row { margin-bottom: 16px; }
    .row:last-child { margin-bottom: 0; }

    .chip-row { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      background: #252a3d; border: 1px solid #2d3348; border-radius: 20px;
      padding: 4px 12px; font-size: 0.76rem; color: #94a3b8;
      cursor: pointer; transition: all 0.15s; user-select: none;
    }
    .chip:hover { border-color: #6366f1; color: #a5b4fc; }

    button#sendBtn {
      width: 100%; padding: 12px; background: linear-gradient(135deg, #6366f1, #4f46e5);
      border: none; border-radius: 8px; color: #fff;
      font-size: 0.97rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
    }
    button#sendBtn:hover { opacity: 0.87; }
    button#sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    #statusBar {
      font-size: 0.81rem; color: #64748b;
      margin-top: 9px; min-height: 16px; text-align: center;
    }

    /* Result */
    #resultCard { display: none; }
    #resultCard.visible { display: block; }

    .result-meta {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
      flex-wrap: wrap; gap: 8px;
    }
    .endpoint-badge {
      background: #252a3d; border: 1px solid #2d3348;
      border-radius: 6px; padding: 3px 10px; font-size: 0.76rem;
      color: #6366f1; font-family: monospace;
    }

    .tabs {
      display: flex; gap: 2px; background: #0f1117;
      border-radius: 8px; padding: 3px; width: fit-content;
    }
    .tab-btn {
      padding: 5px 15px; border: none; border-radius: 6px;
      background: transparent; color: #64748b; font-size: 0.81rem; cursor: pointer; transition: all 0.15s;
    }
    .tab-btn.active { background: #1e2130; color: #e2e8f0; }

    /* Hint */
    .hint-box {
      background: #1a1f2e; border: 1px solid #3b4262;
      border-radius: 8px; padding: 12px 16px; margin-bottom: 14px;
      font-size: 0.85rem; color: #94a3b8;
    }

    /* Table */
    .table-wrap { overflow-x: auto; max-height: 520px; overflow-y: auto; border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th {
      background: #252a3d; color: #94a3b8; font-weight: 600;
      padding: 9px 12px; text-align: left; position: sticky; top: 0; z-index: 1; white-space: nowrap;
    }
    td {
      padding: 8px 12px; border-bottom: 1px solid #1a1f2e;
      color: #cbd5e1; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    tr:hover td { background: #1a1f2e; }

    /* Action buttons inside table */
    .action-bar {
      display: flex; gap: 5px; flex-wrap: wrap; padding: 8px 12px;
      border-bottom: 1px solid #1a1f2e; background: #161924;
    }
    .act-btn {
      padding: 4px 11px; border: 1px solid #3b4262; border-radius: 6px;
      background: transparent; color: #94a3b8; font-size: 0.74rem;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .act-btn:hover { border-color: #6366f1; color: #a5b4fc; background: #1e2130; }

    /* JSON */
    pre#jsonView {
      background: #0f1117; border: 1px solid #2d3348; border-radius: 8px;
      padding: 16px; overflow: auto; max-height: 520px;
      font-size: 0.79rem; line-height: 1.6; color: #a5b4fc;
      white-space: pre-wrap; word-break: break-word;
    }

    .error-box {
      background: #1e1010; border: 1px solid #7f1d1d;
      border-radius: 8px; padding: 16px; color: #fca5a5; font-size: 0.86rem;
    }

    .empty-msg { text-align: center; color: #64748b; padding: 28px; font-size: 0.86rem; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>DataDive Explorer</h1>
    <p>Введите API ключ и запрос — получите данные из DataDive</p>
  </header>

  <div class="card">
    <div class="row">
      <label for="apiKey">DataDive API Key</label>
      <input type="password" id="apiKey" placeholder="Ваш API ключ DataDive" autocomplete="off" />
    </div>
    <div class="row">
      <label for="query">Запрос</label>
      <textarea id="query" placeholder="Например: Покажи мои ниши"></textarea>
      <div class="chip-row">
        <span class="chip" onclick="setQuery('Покажи мои ниши')">Покажи мои ниши</span>
        <span class="chip" onclick="setQuery('Rank radar трекеры')">Rank radar трекеры</span>
      </div>
    </div>
    <button id="sendBtn" onclick="sendQuery()">Отправить ↵</button>
    <div id="statusBar"></div>
  </div>

  <div class="card" id="resultCard">
    <div class="result-meta">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('table', this)">Таблица</button>
        <button class="tab-btn" onclick="switchTab('json', this)">JSON</button>
      </div>
      <span id="endpointBadge" class="endpoint-badge"></span>
    </div>

    <div id="hintBox" class="hint-box" style="display:none;"></div>

    <div id="tableView">
      <div class="table-wrap" id="tableWrap"></div>
    </div>
    <pre id="jsonView" style="display:none;"></pre>
    <div id="errorBox" class="error-box" style="display:none;"></div>
  </div>
</div>

<script>
  let lastJson = null;
  let currentApiKey = () => document.getElementById('apiKey').value.trim();

  function setQuery(text) {
    document.getElementById('query').value = text;
    document.getElementById('query').focus();
  }

  function switchTab(tab, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tableView').style.display = tab === 'table' ? '' : 'none';
    document.getElementById('jsonView').style.display = tab === 'json' ? '' : 'none';
  }

  function setStatus(msg, isError = false) {
    const el = document.getElementById('statusBar');
    el.textContent = msg;
    el.style.color = isError ? '#f87171' : '#64748b';
  }

  // ── Core API call ──────────────────────────────────────────────────────────
  async function callApi(payload) {
    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    setStatus('Загружаю данные...');

    payload.api_key = currentApiKey();
    if (!payload.api_key) { setStatus('Введите API ключ', true); btn.disabled = false; return; }
    sessionStorage.setItem('dd_api_key', payload.api_key);

    try {
      const res = await fetch('/api/datadive', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const json = await res.json();
      renderResult(res.ok, json);
    } catch (e) {
      setStatus('Сетевая ошибка: ' + e.message, true);
    } finally {
      btn.disabled = false;
    }
  }

  function sendQuery() {
    const query = document.getElementById('query').value.trim();
    if (!query) { setStatus('Введите запрос', true); return; }
    callApi({ query });
  }

  // ── Render result ──────────────────────────────────────────────────────────
  function renderResult(ok, json) {
    lastJson = json;
    const resultCard = document.getElementById('resultCard');
    const errorBox = document.getElementById('errorBox');
    const hintBox = document.getElementById('hintBox');

    resultCard.classList.add('visible');
    errorBox.style.display = 'none';
    hintBox.style.display = 'none';

    if (!ok || json.error) {
      errorBox.style.display = '';
      errorBox.textContent = (json.error || `Ошибка`) + (json.detail ? '\n' + json.detail : '');
      document.getElementById('endpointBadge').textContent = '';
      document.getElementById('tableWrap').innerHTML = '';
      document.getElementById('jsonView').textContent = '';
      setStatus('Ошибка DataDive API', true);
      return;
    }

    document.getElementById('endpointBadge').textContent = json.endpoint || '';
    document.getElementById('jsonView').textContent = JSON.stringify(json, null, 2);

    if (json.hint) {
      hintBox.style.display = '';
      hintBox.textContent = '💡 ' + json.hint;
    }

    // Render table
    renderTable(json.data, json.response_type);

    // Switch to table view
    const activeTab = document.querySelector('.tab-btn.active');
    if (activeTab && activeTab.textContent.trim() === 'Таблица') {
      document.getElementById('tableView').style.display = '';
      document.getElementById('jsonView').style.display = 'none';
    }

    setStatus(`Готово — ${json.endpoint}`);
  }

  // ── Table renderer ─────────────────────────────────────────────────────────
  function renderTable(data, responseType) {
    const wrap = document.getElementById('tableWrap');
    wrap.innerHTML = '';

    // Flatten data into rows array
    let rows = [];
    if (Array.isArray(data)) {
      rows = data;
    } else if (data && typeof data === 'object') {
      for (const key of Object.keys(data)) {
        if (Array.isArray(data[key]) && data[key].length > 0) {
          rows = data[key]; break;
        }
      }
      if (!rows.length) rows = [data];
    }

    if (!rows.length) {
      wrap.innerHTML = '<div class="empty-msg">Нет данных</div>';
      return;
    }

    const keys = [...new Set(rows.flatMap(r => r && typeof r === 'object' ? Object.keys(r) : []))];
    if (!keys.length) { wrap.innerHTML = '<div class="empty-msg">Нет данных</div>'; return; }

    // Detect if this is a niches list — find the ID field
    const isNicheList = responseType === 'niches' || keys.some(k =>
      k.toLowerCase().includes('niche') || k.toLowerCase() === 'id'
    );

    const table = document.createElement('table');
    const thead = document.createElement('thead');
    const tbody = document.createElement('tbody');

    // Header row
    const headerRow = document.createElement('tr');
    keys.forEach(k => {
      const th = document.createElement('th');
      th.textContent = k;
      headerRow.appendChild(th);
    });
    // Extra column for actions
    if (isNicheList) {
      const th = document.createElement('th');
      th.textContent = 'Действия';
      headerRow.appendChild(th);
    }
    thead.appendChild(headerRow);

    // Data rows
    rows.forEach(row => {
      // Detect niche ID from the row
      let nicheId = null;
      if (isNicheList && row && typeof row === 'object') {
        // Try common ID field names
        for (const candidate of ['id', 'niche_id', 'nicheId', 'ID', 'Id']) {
          if (row[candidate] !== undefined && row[candidate] !== null) {
            nicheId = String(row[candidate]);
            break;
          }
        }
      }

      const tr = document.createElement('tr');
      keys.forEach(k => {
        const td = document.createElement('td');
        const val = row && row[k] !== undefined ? row[k] : '';
        td.textContent = (val !== null && typeof val === 'object') ? JSON.stringify(val) : (val ?? '');
        td.title = td.textContent;
        tr.appendChild(td);
      });

      // Action buttons column
      if (isNicheList) {
        const td = document.createElement('td');
        td.style.whiteSpace = 'nowrap';
        if (nicheId) {
          const actions = [
            { label: 'Ключевые слова', action: 'keywords' },
            { label: 'Конкуренты',     action: 'competitors' },
            { label: 'Ranking Juice',  action: 'ranking-juices' },
            { label: 'Корни слов',     action: 'roots' },
          ];
          actions.forEach(({ label, action }) => {
            const btn = document.createElement('button');
            btn.className = 'act-btn';
            btn.textContent = label;
            btn.onclick = () => callApi({ action, niche_id: nicheId });
            td.appendChild(btn);
          });
        }
        tr.appendChild(td);
      }

      tbody.appendChild(tr);
    });

    table.appendChild(thead);
    table.appendChild(tbody);
    wrap.appendChild(table);
  }

  // Restore API key from session
  const saved = sessionStorage.getItem('dd_api_key');
  if (saved) document.getElementById('apiKey').value = saved;

  // Ctrl+Enter to submit
  document.getElementById('query').addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) sendQuery();
  });
</script>
</body>
</html>
